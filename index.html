<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amei Salgados | Links</title>
    <link rel="icon" type="image/jpeg" href="static/Logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 min-h-screen flex flex-col justify-between">

    <div class="w-full flex-grow flex flex-col items-center py-10 px-6 relative bg-cover bg-center overflow-y-auto no-scrollbar" style="background-image: url('static/fundo-salgados.jpg');">
        <div class="absolute inset-0 bg-slate-900/60 min-h-full pointer-events-none"></div>

        <div class="relative z-10 w-full max-w-sm flex flex-col items-center fade-in mt-4">
            <div class="relative mb-6">
                <div class="w-36 h-36 rounded-full border-4 border-[#ffc107] p-1 bg-white shadow-[0_0_25px_rgba(0,0,0,0.4)] overflow-hidden">
                    <img src="static/Logo.jpg" alt="Amei Salgados" class="w-full h-full rounded-full object-cover" onerror="this.src='https://via.placeholder.com/150/dc2626/FFFFFF?text=Amei'">
                </div>
            </div>
            
            <h2 class="text-white text-lg md:text-xl font-bold text-center mb-6 tracking-wide drop-shadow-md">
                Amei Salgados<br>
                <span class="text-xs font-medium text-slate-300">A melhor de Uberlândia-MG ✨</span>
            </h2>

            <div class="mb-8 text-center">
                <span id="status-loja-links" class="text-xs font-bold tracking-widest uppercase py-2 px-4 rounded-full bg-slate-950/80 border border-white/10 shadow-md">
                    Verificando horário...
                </span>
            </div>

            <div class="w-full space-y-4">
                <a href="https://ameisalgados.netlify.app/" class="w-full bg-[#ffc107] text-slate-900 font-extrabold text-[13px] tracking-wide py-3 px-3 rounded-full shadow-lg hover:bg-yellow-400 transition-all flex items-center uppercase group">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-[#ffc107] flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                        <i class="fas fa-shopping-basket"></i>
                    </div>
                    <span class="flex-grow text-center pr-10">Fazer Pedido (Cardápio)</span>
                </a>

                <a href="https://www.ifood.com.br/delivery/uberlandia-mg/amei-salgados-laranjeiras/88da371c-d021-49ed-b661-54a9617cbf0b" target="_blank" class="w-full bg-[#ffc107] text-slate-900 font-extrabold text-[13px] tracking-wide py-3 px-3 rounded-full shadow-lg hover:bg-yellow-400 transition-all flex items-center uppercase group">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-[#ffc107] flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <span class="flex-grow text-center pr-10">Pedir pelo iFood</span>
                </a>

                <a href="https://wa.me/5534988979594?text=Ol%C3%A1!%20Gostaria%20de%20tirar%20uma%20d%C3%BAvida%20sobre%20os%20salgados." target="_blank" class="w-full bg-[#ffc107] text-slate-900 font-extrabold text-[13px] tracking-wide py-3 px-3 rounded-full shadow-lg hover:bg-yellow-400 transition-all flex items-center uppercase group">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-[#ffc107] flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <span class="flex-grow text-center pr-10">WhatsApp / Dúvidas</span>
                </a>

                <a href="https://www.google.com/maps/search/?api=1&query=Av.+Seme+Simão,+1319+-+Granada,+Uberlândia+-+MG" target="_blank" class="w-full bg-[#ffc107] text-slate-900 font-extrabold text-[13px] tracking-wide py-3 px-3 rounded-full shadow-lg hover:bg-yellow-400 transition-all flex items-center uppercase group">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-[#ffc107] flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <span class="flex-grow text-center pr-10">Como chegar (Granada)</span>
                </a>

                <button onclick="abrirModalInfo('modal-horarios')" class="w-full bg-[#ffc107] text-slate-900 font-extrabold text-[13px] tracking-wide py-3 px-3 rounded-full shadow-lg hover:bg-yellow-400 transition-all flex items-center uppercase group">
                    <div class="w-10 h-10 rounded-full bg-slate-900 text-[#ffc107] flex items-center justify-center flex-shrink-0 shadow-inner group-hover:scale-105 transition-transform">
                        <i class="fas fa-clock"></i>
                    </div>
                    <span class="flex-grow text-center pr-10">Horários</span>
                </button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
